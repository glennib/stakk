[tools]
cargo-binstall = "1.17.8"
"cargo:cargo-dist" = "0.31.0"
"cargo:cargo-edit" = "0.13.9"
"cargo:cargo-nextest" = "0.9.132"
"cargo:release-plz" = "0.3.157"

[tasks.fmt]
description = "Format code"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check code formatting"
run = "cargo fmt --all -- --check"

[tasks."fmt:nightly"]
description = "Format code with nightly"
run = "cargo +nightly fmt --all"

[tasks."fmt:check:nightly"]
description = "Check code formatting with nightly"
run = "cargo +nightly fmt --all -- --check"

[tasks.clippy]
description = "Run clippy lints"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run tests"
run = "cargo nextest run --all-targets --no-tests=pass"

[tasks.build]
description = "Build release binary"
run = "cargo build --release"

[tasks."build:debug"]
description = "Check that the project compiles"
run = "cargo build"

[tasks.ci]
description = "Run all CI checks"
depends = ["fmt:check", "clippy", "test", "build:debug"]
